name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci --legacy-peer-deps

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test + coverage (enforces vitest.config.ts thresholds)
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Verify build output
        run: |
          test -f dist/index.js
          test -f dist/index.d.ts
          test -f dist/styles.css
          test -f dist/styles/tokens.css
          test -f dist/styles/primitives.css
          test -f dist/styles/layouts.css
          test -f dist/styles/components.css
          test -f dist/styles/base.css
